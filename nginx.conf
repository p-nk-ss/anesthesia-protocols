server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Стиснення.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json
             image/svg+xml application/manifest+json application/xml;

  # Базові заголовки безпеки.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  # Хешовані ассети Astro — кешуємо назавжди (імена змінюються при зміні вмісту).
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
  }

  # Самохостні шрифти.
  location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
  }

  # Service worker та реєстратор — без кешу, щоб оновлення підхоплювалися одразу.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Service-Worker-Allowed "/";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /manifest.webmanifest {
    types { } default_type application/manifest+json;
    add_header Cache-Control "no-cache";
  }

  # HTML — завжди ревалідувати (контент може оновитися при пересборці).
  location / {
    try_files $uri $uri/ $uri.html /index.html;
    add_header Cache-Control "no-cache";
  }
}
